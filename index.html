

<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#0f172a">
	<link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Stereoscope Booking | Coimbra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .stereoscope-icon { transition: none !important; cursor: pointer; z-index: 50; touch-action: manipulation; }
        .stereoscope-icon:hover { filter: brightness(1.1); }
        .bg-available { background-color: #10b981; } 
        .bg-booked-partial { background-color: #f59e0b; }
        .bg-booked-full { background-color: #ef4444; }
        
        .lab-bench { 
            background-color: #ffffff; 
            border: 3px solid #334155; 
            border-radius: 20px; 
            position: absolute; 
            z-index: 10; 
        }
        .lab-door { 
            position: absolute; 
            bottom: -5px; 
            right: 15%; 
            width: 60px; 
            height: 8px; 
            background: #ffffff; 
            border: 3px solid #334155; 
            z-index: 20; 
        }
        
        .day-card.active { border-color: #2563eb; background-color: #eff6ff; }
        .day-card.full-booked::after { 
            content: ''; 
            position: absolute; 
            top: 2px; 
            right: 2px; 
            width: 6px; 
            height: 6px; 
            background: #ef4444; 
            border-radius: 50%; 
        }
        .past-booking { opacity: 0.4; filter: grayscale(0.5); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Responsive adjustments for room height */
        @media (max-width: 768px) {
            .lab-room-container { height: 450px !important; }
            .stereoscope-icon { width: 3.5rem !important; height: 3.5rem !important; }
            .stereoscope-icon i { font-size: 0.875rem !important; }
            .stereoscope-icon span { font-size: 0.65rem !important; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans overflow-x-hidden">

    <!-- LOGIN SCREEN -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] md:rounded-[40px] p-8 md:p-10 max-w-md w-full shadow-2xl text-center">
            <img src="lab_logo.jpg" alt="Lab Logo" class="w-20 h-20 md:w-24 md:h-24 object-contain mx-auto mb-6 rounded-2xl shadow-sm">
            <div class="mb-8">
                <h2 class="text-lg md:text-xl font-black text-slate-800 leading-tight">Environmental Ecology and Ecotoxicology Group</h2>
                <p class="text-[9px] md:text-[10px] font-bold text-blue-600 mt-1 uppercase tracking-[0.1em]">Universidade de Coimbra</p>
            </div>
            <div class="space-y-4 text-left">
                <input type="text" id="login-name" class="w-full bg-slate-50 border-2 border-slate-100 focus:border-blue-500 rounded-2xl px-5 py-4 font-black text-slate-700 outline-none text-sm" placeholder="Your Name">
                <input type="password" id="access-code" class="w-full bg-slate-50 border-2 border-slate-100 focus:border-blue-500 rounded-2xl px-5 py-4 text-center text-lg font-bold tracking-[0.4em] outline-none" placeholder="••••">
            </div>
            <button onclick="checkLogin()" class="w-full bg-slate-900 text-white font-black py-4 md:py-5 rounded-2xl hover:bg-blue-600 transition-all mt-8 uppercase tracking-widest text-xs">Login</button>
            <p id="login-error" class="text-red-500 text-[10px] mt-4 hidden font-bold uppercase tracking-widest">Invalid credentials.</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-content" class="hidden">
        <nav class="bg-white border-b border-slate-200 py-4 px-6 md:px-8 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <img src="lab_logo.jpg" class="w-8 h-8 rounded-lg object-contain">
                    <p class="hidden md:block text-[10px] text-slate-400 font-bold uppercase tracking-widest">Logged: <span id="display-user-name" class="text-blue-600"></span></p>
                    <p class="md:hidden text-[10px] text-blue-600 font-bold uppercase tracking-widest" id="display-user-name-mobile"></p>
                </div>
                <button onclick="logout()" class="text-[9px] md:text-[10px] font-black text-slate-400 hover:text-slate-600 uppercase tracking-widest">Logout</button>
            </div>
        </nav>

        <!-- CALENDAR -->
        <div class="bg-white border-b border-slate-200 py-4 md:py-6 px-4 md:px-8 shadow-sm">
            <div class="max-w-7xl mx-auto">
                <div class="flex items-center justify-between mb-4 md:mb-6">
                    <div>
                        <h2 id="month-display" class="text-2xl md:text-4xl font-black text-slate-900 leading-none"></h2>
                        <p class="text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-1 md:mt-2">Week View</p>
                    </div>
                    <div class="flex space-x-1 md:space-x-2">
                        <button onclick="changeWeek(-1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-600 hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-chevron-left text-sm"></i></button>
                        <button onclick="changeWeek(1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-600 hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-chevron-right text-sm"></i></button>
                    </div>
                </div>
                <div id="calendar-week" class="grid grid-cols-7 gap-1 md:gap-4 overflow-x-hidden"></div>
            </div>
        </div>

        <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-4 gap-6 md:gap-8">
            <div class="lg:col-span-3">
                <div class="bg-white p-4 md:p-10 rounded-[32px] md:rounded-[40px] shadow-sm border border-slate-200 relative">
                    <div class="lab-room-container relative bg-slate-100 rounded-[40px] md:rounded-[50px] p-6 md:p-12 h-[500px] md:h-[600px] border-4 border-white shadow-inner overflow-hidden">
                        <!-- Bench 1 -->
                        <div class="lab-bench" style="left: 15%; top: 10%; width: 10%; height: 80%;"></div>
                        <!-- Bench 2 -->
                        <div class="lab-bench" style="left: 55%; top: 10%; width: 10%; height: 80%;"></div>
                        <!-- Door -->
                        <div class="lab-door"></div>
                        <!-- BUTTONS CONTAINER -->
                        <div id="room-container" class="relative w-full h-full" style="z-index: 100;"></div>
                    </div>
                    <!-- Legend for Mobile -->
                    <div class="flex md:hidden justify-center space-x-4 mt-4 text-[8px] font-black uppercase tracking-widest text-slate-400">
                        <span class="flex items-center"><span class="w-2 h-2 bg-available rounded-full mr-1.5"></span>Free</span>
                        <span class="flex items-center"><span class="w-2 h-2 bg-booked-partial rounded-full mr-1.5"></span>Partial</span>
                        <span class="flex items-center"><span class="w-2 h-2 bg-booked-full rounded-full mr-1.5"></span>Full</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 md:p-8 rounded-[32px] md:rounded-[40px] shadow-sm border border-slate-200 flex flex-col h-[500px] md:h-[740px] lg:sticky lg:top-32">
                <h3 class="text-lg font-black text-slate-800 mb-6 italic">History & Log</h3>
                <div id="global-log" class="flex-grow overflow-y-auto custom-scroll pr-2 space-y-4"></div>
                <button id="clear-data-btn" class="mt-6 text-[8px] md:text-[9px] font-black text-red-300 hover:text-red-500 uppercase tracking-widest text-right">Clear All Data</button>
            </div>
        </main>
    </div>

    <!-- BOOKING MODAL -->
    <div id="booking-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] md:rounded-[40px] shadow-2xl max-w-sm w-full p-8 md:p-10 border border-white/20">
            <div class="flex justify-between items-start mb-6 md:mb-8">
                <div>
                    <h4 class="text-2xl md:text-3xl font-black text-slate-800 italic">Scope #<span id="modal-scope-id"></span></h4>
                    <p class="text-[10px] md:text-xs font-bold text-blue-600 mt-1" id="modal-date-display"></p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full bg-slate-50 text-slate-400">&times;</button>
            </div>
			<div id="slot-info" class="mb-4 text-[10px] text-slate-600 space-y-1"></div>
            <form id="booking-form" class="space-y-6 md:space-y-8">
                <input type="hidden" id="form-scope-id">
                <div class="space-y-3">

					<div class="grid grid-cols-2 gap-6 text-xs font-bold">

    <!-- MORNING COLUMN -->
    <div>
        <div class="text-[10px] font-black text-blue-600 mb-2 uppercase tracking-widest">
            Morning
        </div>

        <div class="flex flex-col gap-2">
            <label><input type="checkbox" value="08-09"> 08–09h</label>
            <label><input type="checkbox" value="09-10"> 09–10h</label>
            <label><input type="checkbox" value="10-11"> 10–11h</label>
            <label><input type="checkbox" value="11-12"> 11–12h</label>
            <label><input type="checkbox" value="12-13"> 12–13h</label>
        </div>
    </div>

    <!-- AFTERNOON COLUMN -->
    <div>
        <div class="text-[10px] font-black text-orange-500 mb-2 uppercase tracking-widest">
            Afternoon
        </div>

        <div class="flex flex-col gap-2">
            <label><input type="checkbox" value="13-14"> 13–14h</label>
            <label><input type="checkbox" value="14-15"> 14–15h</label>
            <label><input type="checkbox" value="15-16"> 15–16h</label>
            <label><input type="checkbox" value="16-17"> 16–17h</label>
            <label><input type="checkbox" value="17-18"> 17–18h</label>
            <label><input type="checkbox" value="18-19"> 18–19h</label>
        </div>
    </div>

</div>
					
					
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 md:py-5 rounded-[20px] md:rounded-[24px] hover:bg-blue-600 transition-all uppercase tracking-widest text-xs shadow-lg">Confirm</button>
            	/// add cancel button 
				<button type="button" id="cancel-booking-btn"
    class="w-full mt-2 bg-red-100 text-red-600 font-black py-3 rounded-[20px] hover:bg-red-200 uppercase tracking-widest text-xs hidden">
    Cancel Booking
</button>
			</form>
        </div>
    </div>

    <script>

function cancelBooking(id) {
    const booking = bookings.find(b => b.id === id);

    if (!booking) return;

    const isOwner = booking.name === currentResearcher;
    const isAdmin = currentResearcher === ADMIN_NAME;

    if (!isOwner && !isAdmin) {
        alert("You can only cancel your own bookings.");
        return;
    }

    if (!confirm("Cancel this booking? You sure? WHAT ABOUT PRODUCTIVITY?!?! Just kidding, make sure to let your colleagues know there's a free spot now.")) return;

    bookings = bookings.filter(b => b.id !== id);

    saveAndSync();
}
		
		
		
		const DATABASE_URL = "https://script.google.com/macros/s/AKfycbwdTM4aqV0ymNERic1aM7VcYovgSWwU8Z2skLos05LZgndZXtUGzYho_2SriTbRiUKCuw/exec";

const LAB_ACCESS_CODE = "labsolos";
const ADMIN_NAME = "Edu";		

const SCOPE_POSITIONS = [
    { id: 1, left: 10, top: 75 }, { id: 2, left: 25, top: 15 },
    { id: 3, left: 50, top: 15 }, { id: 4, left: 50, top: 45 },
    { id: 5, left: 50, top: 75 }, { id: 6, left: 70, top: 15 },
    { id: 7, left: 70, top: 45 }, { id: 8, left: 70, top: 75 },
];

let bookings = [];
let currentStartDate = new Date();
currentStartDate.setDate(currentStartDate.getDate() - currentStartDate.getDay());
let selectedDate = new Date().toISOString().split('T')[0];
let currentResearcher = localStorage.getItem('res_name_v1') || "";

// ---------------- LOGIN ----------------
function checkLogin() {
    const name = document.getElementById('login-name').value.trim();
    const code = document.getElementById('access-code').value;

    if (name && code === LAB_ACCESS_CODE) {
        localStorage.setItem('unlocked_v1', 'true');
        localStorage.setItem('res_name_v1', name);
        currentResearcher = name;
        showApp();
    } else {
        document.getElementById('login-error').classList.remove('hidden');
    }
}

function showApp() {
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('app-content').classList.remove('hidden');
    document.getElementById('display-user-name').innerText = currentResearcher;
    document.getElementById('display-user-name-mobile').innerText = currentResearcher.split(' ')[0];

    loadBookings(); // 
}

// ---------------- DATABASE ----------------
async function loadBookings() {
    try {
        const res = await fetch(DATABASE_URL);
        const data = await res.json();
        bookings = Array.isArray(data) ? data : [];
        render();
    } catch (err) {
        console.error("Load error:", err);
        bookings = JSON.parse(localStorage.getItem('lab_mobile_v1')) || [];
        render();
    }
}

async function saveAndSync() {
    try {
        await fetch(DATABASE_URL, {
    method: "POST",
    mode: "no-cors", //
    body: JSON.stringify(bookings)
});

        localStorage.setItem('lab_mobile_v1', JSON.stringify(bookings));

        await loadBookings(); // 

    } catch (err) {
        console.error("Save error:", err);
        alert("Error syncing with database.");
    }
}

// ---------------- RENDER ----------------
function render() {
    renderCalendar();
    renderMap();
    renderLog();
}

function renderCalendar() {
    const container = document.getElementById('calendar-week');
    container.innerHTML = '';

    document.getElementById('month-display').innerText =
        currentStartDate.toLocaleString('default', { month: 'long', year: 'numeric' });

    for (let i = 0; i < 7; i++) {
        const day = new Date(currentStartDate);
        day.setDate(day.getDate() + i);
        const dateStr = day.toISOString().split('T')[0];

        const count = bookings
            .filter(b => b.date === dateStr)
            .reduce((acc, b) => acc + b.shifts.length, 0);

        const card = document.createElement('div');
        card.className = `day-card p-2 rounded-xl border-2 flex flex-col items-center cursor-pointer 
        ${dateStr === selectedDate ? 'active' : 'bg-white border-slate-50'} 
        ${count >= 11 ? 'full-booked' : ''}`;

        card.innerHTML = `
            <span>${day.toLocaleDateString('en', {weekday: 'short'})}</span>
            <span>${day.getDate()}</span>
        `;

        card.onclick = () => {
            selectedDate = dateStr;
            render();
        };

        container.appendChild(card);
    }
}

function renderMap() {
    const container = document.getElementById('room-container');

    container.innerHTML = `
        <div class="relative w-full h-full rounded-3xl overflow-hidden"
             style="background:
    linear-gradient(90deg, #e5e7eb 1px, transparent 1px),
    linear-gradient(#e5e7eb 1px, transparent 1px);
    background-size: 40px 40px;
    background-color: #f8fafc;">

            <!-- LEFT BENCH -->
            <div class="absolute left-[20%] top-[10%] w-[10%] h-[80%] bg-white rounded-[30px] shadow-inner border border-slate-200"></div>

            <!-- RIGHT BENCH -->
            <div class="absolute left-[60%] top-[10%] w-[10%] h-[80%] bg-white rounded-[30px] shadow-inner border border-slate-200"></div>

            <!-- DOOR -->
            <div class="absolute bottom-[2%] right-[10%] w-[20%] h-[6%] bg-white border-4 border-slate-400 rounded-md"></div>
        </div>
    `;

    const room = container.firstElementChild;

    function createScope(id, x, y) {
        const dayB = bookings.filter(b => b.date === selectedDate && b.scopeId == id);

        const totalSlots = 11;

const bookedSlots = dayB.flatMap(b => b.shifts);
const uniqueSlots = [...new Set(bookedSlots)];

let color = '#10b981'; // green

if (uniqueSlots.length === totalSlots) {
    color = '#ef4444'; // full
} else if (uniqueSlots.length > 0) {
    color = '#f59e0b'; // partial
}

        const btn = document.createElement('div');
        btn.className = "absolute flex flex-col items-center justify-center rounded-2xl shadow-md text-white font-bold cursor-pointer transition-all active:scale-95";
        btn.style.left = x;
        btn.style.top = y;
	btn.style.width = "50px";
	btn.style.height = "50px";
	btn.style.boxShadow = "0 8px 20px rgba(0,0,0,0.15)";
        btn.style.background = color;
        btn.style.transform = "translate(-50%, -50%)";

btn.innerHTML = `
    <i class="fas fa-microscope text-base"></i>
    <span class="text-[9px] mt-0.5 opacity-90">#${id}</span>
`;
        btn.onclick = () => {
    const dayB = bookings.filter(b => b.date === selectedDate && b.scopeId == id);

    
    openModal(id);
};

        room.appendChild(btn);
    }

    // LEFT SIDE (2 scopes)
    createScope(1, "10%", "75%"); // bottom-left
    createScope(2, "35%", "15%"); // top-right near bench

    // RIGHT SIDE (6 scopes)
    createScope(3, "55%", "15%");
    createScope(4, "55%", "45%");
    createScope(5, "55%", "75%");

    createScope(6, "80%", "15%");
    createScope(7, "80%", "45%");
    createScope(8, "80%", "75%");
}

function renderLog() {
    const container = document.getElementById('global-log');

    const sorted = [...bookings].sort((a, b) => b.date.localeCompare(a.date));

   container.innerHTML = sorted.map(b => {
    const isOwner = b.name === currentResearcher;
    const isAdmin = currentResearcher === ADMIN_NAME;

    return `
    <div class="bg-slate-50 p-3 rounded-xl border flex justify-between items-center">
        <div>
            <div class="text-xs font-bold">${b.name}</div>
            <div class="text-[10px] text-slate-500">
                #${b.scopeId} • ${b.date} • ${b.shifts.join(', ')}
            </div>
        </div>

        ${(isOwner || isAdmin) ? `
            <button onclick="cancelBooking(${b.id})"
                class="text-red-500 text-xs font-bold px-2 py-1 rounded hover:bg-red-100">
                ✕
            </button>
        ` : ""}
    </div>
    `;
}).join('');
}

// ---------------- BOOKING ----------------
function openModal(id) {
    document.getElementById('modal-scope-id').innerText = id;
    document.getElementById('form-scope-id').value = id;

    // RESET all checkboxes
    document.querySelectorAll('#booking-form input[type="checkbox"]')
        .forEach(cb => {
            cb.checked = false;
            cb.disabled = false;
            cb.parentElement.classList.remove('opacity-40');
        });

    const dayB = bookings.filter(b => b.date === selectedDate && b.scopeId == id);

    //  find MY booking
    const myBooking = dayB.find(b => b.name === currentResearcher);
	const cancelBtn = document.getElementById('cancel-booking-btn');

if (myBooking) {
    cancelBtn.classList.remove('hidden');
    cancelBtn.onclick = () => {
        if (confirm("Cancel your booking for this scope?")) {
            cancelBooking(myBooking.id);
            closeModal();
        }
    };
} else {
    cancelBtn.classList.add('hidden');
}

    // 🧠 collect all taken slots
    const taken = dayB.flatMap(b => b.shifts);

    // LOOP all checkboxes
    document.querySelectorAll('#booking-form input[type="checkbox"]').forEach(cb => {

        const slot = cb.value;

        //  If slot is taken by ME → checked
        if (myBooking && myBooking.shifts.includes(slot)) {
            cb.checked = true;
        }

        //  If slot taken by OTHERS → disable
        if (taken.includes(slot) && (!myBooking || !myBooking.shifts.includes(slot))) {
            cb.disabled = true;
            cb.parentElement.classList.add('opacity-40');
        }
    });

    //  SHOW WHO BOOKED WHAT
    const infoBox = document.getElementById('slot-info');
    if (infoBox) {
        infoBox.innerHTML = dayB.map(b =>
            `<div class="text-[10px]">
                <b>${b.name}</b>: ${b.shifts.join(', ')}
            </div>`
        ).join('');
    }

    document.getElementById('booking-modal').classList.remove('hidden');
}

		
document.getElementById('booking-form').onsubmit = async (e) => {
    e.preventDefault();

    const s = Array.from(document.querySelectorAll('#booking-form input[type="checkbox"]:checked'))
               .map(cb => cb.value);

    if (!s.length) return alert("Select shift!");

    //  STEP 1: reload latest data
    await loadBookings();

    const scopeId = document.getElementById('form-scope-id').value;

    const dayB = bookings.filter(b => b.date === selectedDate && b.scopeId == scopeId);

   const alreadyTaken = dayB.flatMap(b => b.shifts);

const conflict = s.some(slot => alreadyTaken.includes(slot));

if (conflict) {
    alert("⚠️ Oops! Someone just booked this slot. Unless you're sitting on their lap, please choose another.");
    return;
    }

// remove my old booking if exists
bookings = bookings.filter(b =>
    !(b.date === selectedDate &&
      b.scopeId == scopeId &&
      b.name === currentResearcher)
);
	
    //  STEP 3: safe to book
    bookings.push({
        id: Date.now(),
        scopeId: scopeId,
        date: selectedDate,
        name: currentResearcher,
        shifts: s
    });

    closeModal();
    saveAndSync();
};
		
function closeModal() {
    document.getElementById('booking-modal').classList.add('hidden');
}

// ---------------- OTHER ----------------
function changeWeek(d) {
    currentStartDate.setDate(currentStartDate.getDate() + (d * 7));
    render();
}

function logout() {
    localStorage.removeItem('unlocked_v1');
    location.reload();
}

if (localStorage.getItem('unlocked_v1') === 'true') showApp();

document.getElementById('clear-data-btn').onclick = () => {
    if (currentResearcher !== ADMIN_NAME) {
        alert("Who do you think you are to erase all the evidence? ONLY A GOD COULD DO THAT. No, really, if you need to clear the log (kinda sus, though), talk to Eduardo ");
        return;
    }

    if (confirm("Wipe all laboratory data?")) {
        bookings = [];
        saveAndSync();
    }
};

// AUTO REFRESH EVERY 5s
setInterval(loadBookings, 5000);
</script>
